<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Glassmorphism Cards</title>

  <link rel="stylesheet" href="./style.css" />

  <!-- Remix Icon -->
  <link
    rel="stylesheet"
    href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
  />
</head>

<body>

  <main>

    <!-- NAVBAR -->
    <div class="nav">
      <h1>Explore Art Work</h1>
      <h4>See All</h4>
    </div>

    <!-- CARDS -->
    <div class="boxes">

      <!-- CARD 1 -->
      <div class="box">

        <img src="./images/img-1.jpg" alt="" />

        <div class="content">

          <h6>Monocular</h6>

          <div class="right-content">
            <h6>54.7k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 2 -->
      <div class="box">

        <img src="./images/img-2.jfif" alt="" />

        <div class="content">

          <h6>Horns Mask</h6>

          <div class="right-content">
            <h6>32.4k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 3 -->
      <div class="box">

        <img src="./images/img-3.png" alt="" />

        <div class="content">

          <h6>Light Moon</h6>

          <div class="right-content">
            <h6>86.6k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 4 -->

        <img src="./images/img-4.jfif" alt="" />

          <h6>Skull Wire</h6>

            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 5 -->

        <img src="./images/img-5.jpg" alt="" />

        <div class="content">

          <h6>Spiderman</h6>

          <div class="right-content">
            <h6>24.8k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 6 -->

        <img src="./images/img-6.jpg" alt="" />

          <h6>DeadPool</h6>

          <div class="right-content">
            <h6>59.7k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 7 -->

            <h6>45.7k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

      <!-- CARD 8 -->

        <img src="./images/img-8.jpg" alt="" />

        <div class="content">

          <h6>Plastic Spinal</h6>

          <div class="right-content">
            <h6>98.6k</h6>
            <i class="ri-poker-hearts-line"></i>
          </div>

        </div>

        <button>Place Bid</button>

      </div>

    </div>

  </main>

</html>
