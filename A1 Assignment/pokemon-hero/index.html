<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.6.0/fonts/remixicon.css"
      rel="stylesheet"
    />

    <title>Pokemon</title>
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <section class="hero">
      <!-- Left Pannel -->
      <div class="left-panel">
        <img class="logo-img" src="./images/Logo.png" alt="logo" />
        <p class="subtitle">POKEMON GEN I</p>
        <h1>Pikachu</h1>
        <p class="description">
          Pikachu is an Electric-type Pokémon introduced in Generation I.
          Pikachu are small, chubby, and incredibly cute mouse-like Pokémon.
        </p>

        <div class="Pagination">01/08</div>

        <img class="watermark" src="./images//pokeball.png" alt="pokeball" />
      </div>

      <!-- Right Section -->
      <div class="right-panel">
        <i class="ri-menu-line"></i>

        <div class="dots">
          <span class="black"></span>
          <span></span>
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
      <img class="pikachu" src="./images/pikachu.png" alt="Pikachu" />
    </section>
  </body>
</html>
