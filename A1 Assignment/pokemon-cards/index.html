<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokemon UI</title>

    <!-- CSS -->
    <link rel="stylesheet" href="style.css" />

    <!-- Remix Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/remixicon@4.3.0/fonts/remixicon.css"
      rel="stylesheet"
    />
  </head>

  <body>

    <section class="main">

      <!-- NAVBAR -->

      <nav>

        <i class="ri-menu-line"></i>

        <div class="logo">
          <img
            src="../pokemon-hero/images/Logo.png"
            alt=""
          />
        </div>

        <i class="ri-sun-line"></i>

      </nav>

      <!-- SEARCH -->

      <header class="head">

        <div class="search-box">

          <i class="ri-search-line"></i>

          <input
            type="text"
            placeholder="Search for a Pokemon..."
          />

        </div>

        <div class="filter">

          <span>Filter by types</span>

          <i class="ri-arrow-down-s-line"></i>

        </div>

      </header>

      <!-- CARDS -->

      <section class="cards">

        <!-- CARD 1 -->

        <div class="card">

          <div class="card-top">

            <p>#0908</p>

            <div class="heart">
              <i class="ri-heart-line"></i>
            </div>

          </div>

          <img
            class="pokemon-img"
            src="https://img.pokemondb.net/artwork/large/meowscarada.jpg"
            alt=""
          />

          <h2>Meowscarada</h2>

          <div class="bottom">

            <span class="type grass">GRASS</span>

            <div class="arrow">
              <i class="ri-arrow-right-line"></i>
            </div>

          </div>

        </div>

        <!-- CARD 2 -->

        <div class="card">

          <div class="card-top">

            <p>#0624</p>

            <div class="heart">
              <i class="ri-heart-line"></i>
            </div>

          </div>

          <img
            class="pokemon-img"
            src="https://img.pokemondb.net/artwork/large/pawniard.jpg"
            alt=""
          />

          <h2>Pawniard</h2>

          <div class="bottom">

            <span class="type steel">STEEL</span>

            <div class="arrow">
              <i class="ri-arrow-right-line"></i>
            </div>

          </div>

        </div>

        <!-- CARD 3 -->

        <div class="card">

          <div class="card-top">

            <p>#0229</p>

            <div class="heart">
              <i class="ri-heart-line"></i>
            </div>

          </div>

          <img
            class="pokemon-img"
            src="https://img.pokemondb.net/artwork/large/houndoom.jpg"
            alt=""
          />

          <h2>Houndoom</h2>

          <div class="bottom">

            <span class="type fire">FIRE</span>

            <div class="arrow">
              <i class="ri-arrow-right-line"></i>
            </div>

          </div>

        </div>

        <!-- CARD 4 -->

        <div class="card">

          <div class="card-top">

            <p>#0686</p>

            <div class="heart">
              <i class="ri-heart-line"></i>
            </div>

          </div>

          <img
            class="pokemon-img"
            src="https://img.pokemondb.net/artwork/large/inkay.jpg"
            alt=""
          />

          <h2>Inkay</h2>

          <div class="bottom">

            <span class="type water">WATER</span>

            <div class="arrow">
              <i class="ri-arrow-right-line"></i>
            </div>

          </div>

        </div>

      </section>

      <!-- FEATURES -->

      <section class="features">

        <div class="feature-box">

          <div class="feature-icon blue">
            <i class="ri-compass-line"></i>
          </div>

          <div class="feature-text">
            <h3>Explore</h3>
            <p>Discover all your favorite Pokémon</p>
          </div>

        </div>

        <div class="feature-box">

          <div class="feature-icon green">
            <i class="ri-leaf-line"></i>
          </div>

          <div class="feature-text">
            <h3>Filter</h3>
            <p>Find Pokémon by type</p>
          </div>

        </div>

        <div class="feature-box">

          <div class="feature-icon yellow">
            <i class="ri-star-line"></i>
          </div>

          <div class="feature-text">
            <h3>Collection</h3>
            <p>Save and manage collection</p>
          </div>

        </div>

        <div class="feature-box">

          <div class="feature-icon purple">
            <i class="ri-bar-chart-line"></i>
          </div>

          <div class="feature-text">
            <h3>Stats</h3>
            <p>View Pokémon stats</p>
          </div>

        </div>

      </section>

      <!-- FOOTER -->

      <footer>
        © 2024 Pokémon. All rights reserved.
      </footer>

    </section>

  </body>
</html>
